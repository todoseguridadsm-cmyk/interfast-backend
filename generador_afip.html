<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador CSR y Llave Privada - AFIP</title>
  <!-- Tailwind CSS para darle estilo rápido y bonito -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Node-Forge para la generación de claves en el navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Generador de Certificados (AFIP)</h2>
    
    <div class="mb-4">
      <label class="block text-gray-700 font-semibold mb-2">Tu CUIT (11 dígitos sin guiones):</label>
      <input type="text" id="cuit" placeholder="Ej: 20123456789" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300">
    </div>

    <div class="mb-6">
      <label class="block text-gray-700 font-semibold mb-2">Nombre de la Empresa o Titular:</label>
      <input type="text" id="empresa" placeholder="Ej: INTERFAST SRL o Juan Perez" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-300">
    </div>

    <button id="btnGenerar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition-colors flex justify-center items-center">
      Generar Clave y CSR
    </button>

    <div id="status" class="mt-4 text-center font-medium text-gray-600 hidden">
      Generando claves... esto puede tardar unos segundos...
    </div>

    <div id="result" class="mt-6 hidden">
      <div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4" role="alert">
        <p class="font-bold">¡Archivos generados exitosamente!</p>
        <p class="text-sm">Se han descargado a tu computadora. El .csr es el que debes subir a ARCA/AFIP.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('btnGenerar').addEventListener('click', function() {
      const cuit = document.getElementById('cuit').value.trim();
      const empresa = document.getElementById('empresa').value.trim();

      if(!cuit || cuit.length !== 11 || isNaN(cuit)){
        alert("Por favor ingresa un CUIT válido de 11 números sin guiones.");
        return;
      }
      if(!empresa){
        alert("Por favor ingresa el nombre de tu empresa.");
        return;
      }

      const btn = document.getElementById('btnGenerar');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.classList.add('opacity-50', 'cursor-not-allowed');
      status.classList.remove('hidden');

      // Pequeño timeout para permitir que se dibuje la UI (spinner)
      setTimeout(() => {
        try {
          console.log("Generando par de claves RSA a 2048 bits...");
          // Generar par de claves RSA a 2048 bits (lo recomendado por AFIP)
          const keys = forge.pki.rsa.generateKeyPair(2048);
          
          console.log("Generando CSR...");
          // Crear CSR
          const csr = forge.pki.createCertificationRequest();
          csr.publicKey = keys.publicKey;
          
          csr.setSubject([
            { shortName: 'C', value: 'AR' },
            { shortName: 'O', value: empresa },
            { shortName: 'CN', value: 'MiSistema' },
            { name: 'serialNumber', value: 'CUIT ' + cuit } 
          ]);

          // Firmar el CSR con la llave privada
          csr.sign(keys.privateKey, forge.md.sha256.create());

          // Exportar a PEM
          const pemPrivateKey = forge.pki.privateKeyToPem(keys.privateKey);
          const pemCsr = forge.pki.certificationRequestToPem(csr);

          // Disparar las descargas
          downloadFile('private_key.key', pemPrivateKey);
          downloadFile('pedido.csr', pemCsr);

          status.classList.add('hidden');
          document.getElementById('result').classList.remove('hidden');
        } catch (error) {
          alert("Ocurrió un error: " + error.message);
          console.error(error);
        } finally {
          btn.disabled = false;
          btn.classList.remove('opacity-50', 'cursor-not-allowed');
          status.classList.add('hidden');
        }
      }, 100);
    });

    function downloadFile(filename, text) {
      const element = document.createElement('a');
      element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
      element.setAttribute('download', filename);

      element.style.display = 'none';
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    }
  </script>
</body>
</html>
